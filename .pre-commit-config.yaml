repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.3.2
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.9.0'
    hooks:
      - id: mypy
        args: ["--check-untyped-defs",]
  - repo: local
    hooks:
      - id: wily
        name: wily
        entry: wily diff
        verbose: true
        language: python
        additional_dependencies: [wily]
  - repo: https://github.com/asottile/dead
    rev: v1.5.0
    hooks:
      - id: dead
  - repo: https://github.com/pycqa/pydocstyle
    rev: 4.0.1
    hooks:
      - id: pydocstyle
  - repo: https://github.com/PyCQA/bandit
    rev: '1.7.5' # Update me!
    hooks:
      - id: bandit
